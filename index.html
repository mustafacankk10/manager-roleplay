<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Roleplay Lig Sistemi</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0d1117;
      color:white;
    }

    header{
      text-align:center;
      padding:40px;
      background:linear-gradient(135deg,#111827,#1f2937);
      position:relative;
    }

    header h1{
      margin:0;
      font-size:40px;
    }

    /* ADMIN TOP RIGHT */
    .admin-login{
      position:absolute;
      top:15px;
      right:15px;
      background:#161b22;
      padding:10px;
      border-radius:10px;
      display:flex;
      gap:5px;
      align-items:center;
    }

    .admin-login input{
      padding:5px;
      border:none;
      border-radius:5px;
      width:120px;
    }

    .admin-login button{
      padding:6px 10px;
      border:none;
      border-radius:5px;
      background:#38bdf8;
      cursor:pointer;
      font-weight:bold;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:20px;
      background:#111827;
      padding:15px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .section{
      max-width:1000px;
      margin:40px auto;
      padding:0 20px;
    }

    h2{
      border-left:5px solid #38bdf8;
      padding-left:10px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card{
      background:#161b22;
      padding:15px;
      border-radius:12px;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    /* ADMIN PANEL */
    #adminPanel{
      display:none;
      max-width:1000px;
      margin:30px auto;
      padding:20px;
      background:#0f172a;
      border-radius:12px;
    }

    .add-team{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .add-team input{
      flex:1;
      padding:10px;
      border:none;
      border-radius:8px;
    }

    .add-team button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      cursor:pointer;
      font-weight:bold;
    }

    footer{
      text-align:center;
      padding:20px;
      background:#111827;
      margin-top:40px;
      color:#94a3b8;
    }
  </style></head><body><header>
  <h1>Manager Roleplay</h1>  <div class="admin-login">
    <input id="user" placeholder="Admin" />
    <input id="pass" type="password" placeholder="Şifre" />
    <button onclick="login()">Giriş</button>
  </div></header><nav>
  <a href="#superlig">Süper Lig</a>
  <a href="#tff1">TFF 1. Lig</a>
</nav><section class="section" id="superlig">
  <h2>Süper Lig</h2>
  <div class="cards" id="superLigList">
    <div class="card">Galatasaray</div>
    <div class="card">Fenerbahçe</div>
    <div class="card">Beşiktaş</div>
  </div>
</section><section class="section" id="tff1">
  <h2>TFF 1. Lig</h2>
  <div class="cards">
    <div class="card">Eyüpspor</div>
    <div class="card">Samsunspor</div>
  </div>
</section><section id="adminPanel">
  <h2>Admin Panel</h2>  <div class="add-team">
    <input id="teamName" placeholder="Takım adı yaz" />
    <button onclick="addTeam()">Takım Ekle</button>
  </div>  <div class="cards" id="adminList"></div>
</section><footer>
  © Manager Roleplay
</footer><script>
function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;

  if(u==='admin_mustafa' && p==='1453'){
    document.getElementById('adminPanel').style.display='block';
    alert('Admin giriş başarılı');
  }else{
    alert('Hatalı giriş');
  }
}

function addTeam(){
  let name=document.getElementById('teamName').value;
  if(name==='') return;

  let div=document.createElement('div');
  div.className='card';
  div.innerText=name;

  document.getElementById('adminList').appendChild(div);
  document.getElementById('teamName').value='';
}
</script></body>
</html>
