<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Roleplay Lig Sistemi</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0d1117;
      color:white;
    }

    header{
      text-align:center;
      padding:40px;
      background:linear-gradient(135deg,#111827,#1f2937);
    }

    header h1{
      margin:0;
      font-size:40px;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:20px;
      background:#111827;
      padding:15px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .section{
      max-width:1000px;
      margin:40px auto;
      padding:0 20px;
    }

    h2{
      border-left:5px solid #38bdf8;
      padding-left:10px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:15px;
    }

    .card{
      background:#161b22;
      padding:15px;
      border-radius:12px;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    footer{
      text-align:center;
      padding:20px;
      background:#111827;
      margin-top:40px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>Manager Roleplay</h1>
  <p>Süper Lig & TFF 1. Lig Sistemi</p>
</header>

<nav>
  <a href="#superlig">Süper Lig</a>
  <a href="#tff1">TFF 1. Lig</a>
</nav>

<section class="section" id="superlig">
  <h2>Süper Lig</h2>
  <div class="cards">
    <div class="card">Galatasaray</div>
    <div class="card">Fenerbahçe</div>
    <div class="card">Beşiktaş</div>
    <div class="card">Trabzonspor</div>
    <div class="card">Başakşehir</div>
  </div>
</section>

<section class="section" id="tff1">
  <h2>TFF 1. Lig</h2>
  <div class="cards">
    <div class="card">Eyüpspor</div>
    <div class="card">Samsunspor</div>
    <div class="card">Gençlerbirliği</div>
    <div class="card">Bodrum FK</div>
    <div class="card">Kocaelispor</div>
  </div>
</section>

<footer>
  © Manager Roleplay Lig Sistemi
</footer>

</body>
</html>
