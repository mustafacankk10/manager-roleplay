<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager RP | Full System</title>  <style>
    :root{
      --red:#e10600;
      --dark:#0b0b0f;
      --card:#141420;
      --white:#fff;
    }

    body{
      margin:0;
      font-family:Arial;
      background:var(--dark);
      color:var(--white);
    }

    /* TOP BAR */
    header{
      position:relative;
      padding:25px;
      text-align:center;
      background:linear-gradient(135deg,var(--red),#7a0000);
    }

    header h1{
      margin:0;
      font-size:34px;
    }

    /* HAMBURGER */
    .menuBtn{
      position:absolute;
      left:15px;
      top:15px;
      font-size:28px;
      cursor:pointer;
      user-select:none;
    }

    /* ADMIN BTN */
    .adminBtn{
      position:absolute;
      right:15px;
      top:15px;
      background:var(--red);
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      left:-220px;
      top:0;
      width:200px;
      height:100%;
      background:#111;
      padding:20px;
      transition:0.3s;
      border-right:2px solid var(--red);
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin:15px 0;
      font-weight:bold;
    }

    .sidebar.active{
      left:0;
    }

    /* SECTIONS */
    .section{
      max-width:1000px;
      margin:40px auto;
      padding:0 20px;
    }

    h2{
      border-left:5px solid var(--red);
      padding-left:10px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:10px;
    }

    .card{
      background:var(--card);
      padding:15px;
      border-radius:12px;
    }

    /* ADMIN MODAL */
    .modal{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .modalBox{
      background:#111;
      padding:20px;
      border-radius:12px;
      width:300px;
    }

    .modalBox input{
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .modalBox button{
      width:100%;
      padding:10px;
      background:var(--red);
      border:none;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    footer{
      text-align:center;
      padding:20px;
      margin-top:40px;
      background:#111;
      color:#aaa;
    }
  </style></head><body><header>
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  <div class="adminBtn" onclick="openAdmin()">ADMIN</div>
  <h1>MANAGER RP FULL SYSTEM</h1>
</header><!-- SIDEBAR --><div class="sidebar" id="sidebar">
  <a href="#superlig">Süper Lig</a>
  <a href="#tff1">TFF 1</a>
  <a href="#puan">Puan Durumu</a>
</div><!-- SUPER LIG --><section class="section" id="superlig">
  <h2>Süper Lig</h2>
  <div class="cards" id="superList"></div>
</section><!-- TFF1 --><section class="section" id="tff1">
  <h2>TFF 1. Lig</h2>
  <div class="cards" id="tffList"></div>
</section><!-- PUAN --><section class="section" id="puan">
  <h2>Puan Durumu</h2>
  <div class="cards" id="puanList"></div>
</section><!-- ADMIN MODAL --><div class="modal" id="adminModal">
  <div class="modalBox">
    <h3>Admin Giriş</h3>
    <input id="u" placeholder="Kullanıcı" />
    <input id="p" type="password" placeholder="Şifre" />
    <button onclick="login()">Giriş</button>
  </div>
</div><script>
let superLig = JSON.parse(localStorage.getItem("super")) || [
  {name:"Galatasaray",pts:10},
  {name:"Fenerbahçe",pts:8},
  {name:"Beşiktaş",pts:6}
];

let tff1 = JSON.parse(localStorage.getItem("tff")) || [
  {name:"Eyüpspor",pts:7},
  {name:"Samsunspor",pts:5}
];

function render(){
  document.getElementById("superList").innerHTML = superLig.map(t=>
    `<div class='card'>${t.name} - ${t.pts} P</div>`).join("");

  document.getElementById("tffList").innerHTML = tff1.map(t=>
    `<div class='card'>${t.name} - ${t.pts} P</div>`).join("");

  let all=[...superLig,...tff1];
  document.getElementById("puanList").innerHTML = all.sort((a,b)=>b.pts-a.pts)
  .map(t=>`<div class='card'>${t.name} - ${t.pts} P</div>`).join("");
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function openAdmin(){
  document.getElementById("adminModal").style.display="flex";
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u=="admin_mustafa" && p=="1453"){
    alert("Giriş başarılı");
    document.getElementById("adminModal").style.display="none";
    adminPanel();
  }else{
    alert("Hatalı giriş");
  }
}

function adminPanel(){
  let team=prompt("Takım adı yaz (Süper Lig eklenir)");
  if(team){
    superLig.push({name:team,pts:0});
    localStorage.setItem("super",JSON.stringify(superLig));
    render();
  }
}

window.onclick=function(e){
  if(e.target.id=="adminModal"){
    document.getElementById("adminModal").style.display="none";
  }
}

render();
</script></body>
</html>
