<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager RP</title>  <style>
    :root{
      --red:#e10600;
      --dark:#0b0b0f;
      --card:#141420;
      --white:#fff;
    }

    body{
      margin:0;
      font-family:Arial;
      background:var(--dark);
      color:var(--white);
    }

    /* HEADER */
    header{
      position:relative;
      text-align:center;
      padding:40px 20px;
      background:linear-gradient(135deg,var(--red),#6a0000);
    }

    header h1{
      margin:0;
      font-size:34px;
    }

    .intro{
      text-align:center;
      margin:30px 0;
      font-size:18px;
      line-height:1.8;
    }

    .intro span{
      display:block;
      font-size:20px;
      font-weight:bold;
    }

    /* MENU */
    .menuBtn{
      position:absolute;
      left:15px;
      top:15px;
      font-size:28px;
      cursor:pointer;
    }

    .adminBtn{
      position:absolute;
      right:15px;
      top:15px;
      background:var(--red);
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    /* SIDEBAR */
    .sidebar{
      position:fixed;
      left:-240px;
      top:0;
      width:220px;
      height:100%;
      background:#111;
      padding:20px;
      transition:0.3s;
      border-right:2px solid var(--red);
    }

    .sidebar.active{left:0;}

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      margin:15px 0;
      font-weight:bold;
    }

    /* SECTION */
    .section{
      max-width:1000px;
      margin:40px auto;
      padding:0 20px;
    }

    h2{
      border-left:5px solid var(--red);
      padding-left:10px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:10px;
    }

    .card{
      background:var(--card);
      padding:15px;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .ok{color:#22c55e;font-weight:bold;}
    .no{color:#ef4444;font-weight:bold;}

    footer{
      text-align:center;
      padding:20px;
      background:#111;
      margin-top:40px;
    }

    /* ADMIN MODAL */
    .modal{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    .box{
      background:#111;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:var(--red);
      border:none;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }
  </style></head><body><header>
  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  <div class="adminBtn" onclick="openAdmin()">ADMIN</div>
  <h1>MANAGER RP</h1>
</header><div class="intro">
  <span>MANAGER RP Kurucular</span>
  Yaso<br>Mustafa<br>Redline
</div><div class="sidebar" id="sidebar">
  <a href="#teams">Takım Listesi</a>
  <a href="#super">Süper Lig</a>
  <a href="#tff">TFF 1</a>
  <a href="#puan">Puan Durumu</a>
</div><section class="section" id="teams">
  <h2>Takım Listesi</h2>
  <div class="cards" id="teamList"></div>
</section><section class="section" id="super">
  <h2>Süper Lig</h2>
  <div class="cards" id="superList"></div>
</section><section class="section" id="tff">
  <h2>TFF 1. Lig</h2>
  <div class="cards" id="tffList"></div>
</section><section class="section" id="puan">
  <h2>Puan Durumu</h2>
  <div class="cards" id="puanList"></div>
</section><div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin Giriş</h3>
    <input id="u" placeholder="Kullanıcı" />
    <input id="p" type="password" placeholder="Şifre" />
    <button onclick="login()">Giriş</button>
  </div>
</div><footer>
  discord.gg/managerp
</footer><script>
let teams = JSON.parse(localStorage.getItem("teams")) || [
  {name:"Galatasaray",full:true},
  {name:"Fenerbahçe",full:false},
  {name:"Beşiktaş",full:true}
];

let superL = JSON.parse(localStorage.getItem("super")) || [];
let tffL = JSON.parse(localStorage.getItem("tff")) || [];

function render(){

  document.getElementById("teamList").innerHTML = teams.map((t,i)=>
    `<div class='card'>${t.name} <span onclick='toggle(${i})' style='cursor:pointer'>${t.full?"<span class=ok>✅</span>":"<span class=no>❌</span>"}</span></div>`).join("");

  document.getElementById("superList").innerHTML = superL.map(t=>`<div class='card'>${t}</div>`).join("");
  document.getElementById("tffList").innerHTML = tffL.map(t=>`<div class='card'>${t}</div>`).join("");

  let all=[...superL,...tffL];
  document.getElementById("puanList").innerHTML = all.map(t=>`<div class='card'>${t}</div>`).join("");
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function openAdmin(){
  document.getElementById("adminModal").style.display="flex";
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u=="admin_mustafa" && p=="1453"){
    alert("Giriş başarılı");
    document.getElementById("adminModal").style.display="none";
  }else alert("Hatalı giriş");
}

function toggle(i){
  teams[i].full=!teams[i].full;
  localStorage.setItem("teams",JSON.stringify(teams));
  render();
}

render();
</script></body>
</html>
