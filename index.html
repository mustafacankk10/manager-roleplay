<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MANAGER RP</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
nav{background:#5a0000;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid gold}
.logo{font-size:28px;font-weight:700;color:gold}
button{cursor:pointer}
.nav-btn,.admin-btn{background:none;border:none;color:#fff;margin-left:10px;font-size:15px}
.admin-btn{background:gold;color:#111;padding:8px 14px;border-radius:6px;font-weight:700}
.page{padding:20px;max-width:1100px;margin:auto}
.section-title{font-size:28px;color:gold;margin-bottom:20px}
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.team-card{background:#1c1c1c;border:1px solid #333;padding:14px;border-left:4px solid gold;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.team-name{font-weight:700}
.status{font-size:20px}
.status.full{color:#00d26a}
.status.empty{color:#ff4444}
#loginModal,#adminPanel{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999}
.box{background:#1b1b1b;padding:24px;border:2px solid gold;width:90%;max-width:420px;border-radius:10px}
input,select{width:100%;padding:10px;margin:8px 0;background:#222;border:1px solid #444;color:#fff}
.save-btn{background:gold;color:#111;border:none;padding:10px 16px;font-weight:700;width:100%;margin-top:10px}
.close{float:right;background:none;border:none;color:#fff;font-size:20px}
</style>
</head>
<body><nav>
<div class="logo">MANAGER RP</div>
<div>
<button class="nav-btn" onclick="showLeague('superlig')">Süper Lig</button>
<button class="nav-btn" onclick="showLeague('tff1')">TFF 1. Lig</button>
<button class="admin-btn" onclick="openLogin()">Admin</button>
</div>
</nav><div class="page">
<h1 class="section-title" id="leagueTitle">Süper Lig</h1>
<div class="team-grid" id="teamGrid"></div>
</div><div id="loginModal">
<div class="box">
<button class="close" onclick="closeLogin()">×</button>
<h2>Admin Giriş</h2>
<input id="username" placeholder="Kullanıcı adı" />
<input id="password" type="password" placeholder="Şifre" />
<button class="save-btn" onclick="login()">Giriş Yap</button>
</div>
</div><div id="adminPanel">
<div class="box">
<button class="close" onclick="closeAdmin()">×</button>
<h2>Takım Durumu Güncelle</h2>
<select id="adminLeague">
<option value="superlig">Süper Lig</option>
<option value="tff1">TFF 1. Lig</option>
</select>
<select id="adminTeam"></select>
<select id="adminStatus">
<option value="true">Dolu</option>
<option value="false">Boş</option>
</select>
<button class="save-btn" onclick="updateTeamStatus()">Kaydet</button>
</div>
</div><script>
const defaultData = {
  superlig:[
    {name:'İstanbul Başakşehir',full:true},
    {name:'Galatasaray',full:true},
    {name:'Beşiktaş JK',full:true},
    {name:'Çaykur Rizespor',full:true},
    {name:'Fenerbahçe',full:true},
    {name:'Göztepe FK',full:true},
    {name:'Erzurumspor',full:true},
    {name:'Samsunspor',full:true},
    {name:'Kocaelispor',full:true},
    {name:'Trabzonspor',full:true},
    {name:'Kasımpaşa FK',full:true},
    {name:'Gaziantep FK',full:true},
    {name:'Corendon Alanyaspor',full:true},
    {name:'Konyaspor',full:true},
    {name:'Antalyaspor',full:true},
    {name:'Çorum FK',full:true},
    {name:'Kayserispor',full:true},
    {name:'Amed Sportif Faaliyetler',full:true}
  ],
  tff1:[
    {name:'Bursaspor',full:true},
    {name:'Bodrumspor',full:true},
    {name:'İstanbulspor',full:true},
    {name:'Elazığspor',full:true},
    {name:'Iğdır FK',full:true},
    {name:'Gençlerbirliği',full:true},
    {name:'İkas Eyüpspor',full:true},
    {name:'Karagümrük',full:true},
    {name:'Bandırmaspor',full:true},
    {name:'Keçiörengücü',full:true},
    {name:'Manisa',full:true},
    {name:'Sivasspor',full:true},
    {name:'Vanspor',full:true},
    {name:'Boluspor',full:false},
    {name:'Sarıyer SK',full:true},
    {name:'Ümraniyespor',full:true},
    {name:'Batman Petrol Spor',full:true},
    {name:'Erokspor',full:true},
    {name:'Pendikspor',full:true},
    {name:'Aliağa',full:true}
  ]
};

let state = JSON.parse(localStorage.getItem('manager_rp_data')) || defaultData;
let currentLeague = 'superlig';

function save(){
  localStorage.setItem('manager_rp_data', JSON.stringify(state));
}

function showLeague(league){
  currentLeague = league;
  document.getElementById('leagueTitle').textContent = league === 'superlig' ? 'Süper Lig' : 'TFF 1. Lig';
  renderTeams();
}

function renderTeams(){
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  state[currentLeague].forEach(team=>{
    grid.innerHTML += `
      <div class="team-card">
        <div class="team-name">${team.name}</div>
        <div class="status ${team.full ? 'full':'empty'}">${team.full ? '✅' : '❌'}</div>
      </div>`;
  });
  fillAdminTeams();
}

function openLogin(){ document.getElementById('loginModal').style.display='flex'; }
function closeLogin(){ document.getElementById('loginModal').style.display='none'; }
function closeAdmin(){ document.getElementById('adminPanel').style.display='none'; }

function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if(u === 'mustafa' && p === '1453'){
    closeLogin();
    document.getElementById('adminPanel').style.display='flex';
    fillAdminTeams();
  } else {
    alert('Hatalı giriş');
  }
}

function fillAdminTeams(){
  const league = document.getElementById('adminLeague')?.value || currentLeague;
  const select = document.getElementById('adminTeam');
  if(!select) return;
  select.innerHTML = '';
  state[league].forEach((t,i)=>{
    select.innerHTML += `<option value="${i}">${t.name}</option>`;
  });
}

document.getElementById('adminLeague').addEventListener('change', fillAdminTeams);

function updateTeamStatus(){
  const league = document.getElementById('adminLeague').value;
  const index = document.getElementById('adminTeam').value;
  const status = document.getElementById('adminStatus').value === 'true';
  state[league][index].full = status;
  save();
  if(currentLeague === league) renderTeams();
  alert('Kaydedildi');
}

renderTeams();
</script></body>
</html>
