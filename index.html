<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager RP</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
}

header{
  background:#e10600;
  padding:25px;
  text-align:center;
  position:relative;
}

header h1{margin:0;}

.menu{
  position:absolute;
  left:15px;
  top:15px;
  font-size:28px;
  cursor:pointer;
}

.admin{
  position:absolute;
  right:15px;
  top:15px;
  background:black;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  left:-240px;
  top:0;
  width:220px;
  height:100%;
  background:#111;
  padding:20px;
  transition:0.3s;
}

.sidebar a{
  display:block;
  color:white;
  text-decoration:none;
  margin:15px 0;
}

.sidebar.active{left:0;}

.section{
  max-width:900px;
  margin:40px auto;
  padding:10px;
}

.card{
  background:#1a1a25;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
}

.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
}

button{
  width:100%;
  padding:8px;
  background:#e10600;
  border:none;
  color:white;
  cursor:pointer;
}
</style></head><body><header>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <div class="admin" onclick="openAdmin()">ADMIN</div>
  <h1>MANAGER RP</h1>
</header><div class="sidebar" id="sidebar">
  <a href="#super">Süper Lig</a>
  <a href="#tff">TFF 1</a>
  <a href="#blog">Blog / Haber</a>
</div><!-- SUPER LIG --><div class="section" id="super">
  <h2>Süper Lig TAKIMLAR</h2>
  <div id="superList"></div>
</div><!-- TFF1 --><div class="section" id="tff">
  <h2>TFF 1. LİG DOLU TAKIMLAR</h2>
  <div id="tffList"></div>
</div><!-- BLOG --><div class="section" id="blog">
  <h2>Blog / Haber</h2>
  <div id="blogList"></div>
</div><!-- ADMIN --><div class="modal" id="modal">
  <div class="box">
    <h3>Admin Giriş</h3>
    <input id="u" placeholder="kullanıcı">
    <input id="p" type="password" placeholder="şifre">
    <button onclick="login()">Giriş</button>
  </div>
</div><script>

let superLig=[
"İstanbul Başakşehir ✅",
"Galatasaray ✅",
"Beşiktaş JK ✅",
"Çaykur Rizespor ✅",
"Fenerbahçe ✅",
"Göztepe FK ✅",
"Erzurumspor ✅",
"Samsunspor ✅",
"Kocaelispor ✅",
"Trabzonspor ✅",
"Kasımpaşa FK ✅",
"Gaziantep FK ✅",
"Corendon Alanyaspor ✅",
"Konyaspor ✅",
"Antalyaspor ✅",
"Çorum FK ✅",
"Kayserispor ✅",
"Amed Sportif Faaliyetler ✅"
];

let tff=[
"Bursaspor ✅",
"Bodrumspor ✅",
"İstanbulspor ✅",
"Elazığspor ✅",
"Iğdır FK ✅",
"Gençlerbirliği ✅",
"İkas Eyüpspor ❌",
"Karagümrük ✅",
"Bandırmaspor ✅",
"Keçiörengücü ✅",
"Manisa FK ✅",
"Sivasspor ✅",
"Vanspor FK ✅",
"Boluspor ❌",
"Sarıyer SK ✅",
"Ümraniyespor ✅",
"Batman Petrolspor ✅",
"Erokspor ✅",
"Pendikspor ✅",
"Aliağa FK ✓"
];

let blog=[
"Lig başladı! Yeni sezon heyecanı 🔥"
];

function render(){
  document.getElementById("superList").innerHTML=
  superLig.map(t=>`<div class='card'>${t}</div>`).join("");

  document.getElementById("tffList").innerHTML=
  tff.map(t=>`<div class='card'>${t}</div>`).join("");

  document.getElementById("blogList").innerHTML=
  blog.map(b=>`<div class='card'>📰 ${b}</div>`).join("");
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function openAdmin(){
  document.getElementById("modal").style.display="flex";
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;

  if(u==="admin_mustafa" && p=="1453"){
    alert("Giriş başarılı");
    document.getElementById("modal").style.display="none";

    let secim=prompt("1=Blog ekle / 2=Hiçbir şey");

    if(secim=="1"){
      let y=prompt("Haber yaz");
      if(y){
        blog.push(y);
        render();
      }
    }
  }else alert("hatalı giriş");
}

render();

</script></body>
</html>
