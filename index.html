<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager RP | Elite Lig Sistemi</title>  <style>
    :root{
      --red:#e10600;
      --dark:#0b0b0f;
      --card:#141420;
      --white:#ffffff;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--dark);
      color:var(--white);
    }

    header{
      position:relative;
      text-align:center;
      padding:50px 20px;
      background:linear-gradient(135deg,var(--red),#7a0000);
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    header h1{
      margin:0;
      font-size:48px;
      letter-spacing:2px;
    }

    header p{
      margin-top:10px;
      opacity:0.9;
    }

    /* ADMIN TOP RIGHT */
    .admin-login{
      position:absolute;
      top:15px;
      right:15px;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:12px;
      display:flex;
      gap:5px;
      align-items:center;
      backdrop-filter:blur(8px);
    }

    .admin-login input{
      padding:6px;
      border:none;
      border-radius:6px;
      width:110px;
    }

    .admin-login button{
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:var(--red);
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    nav{
      display:flex;
      justify-content:center;
      gap:25px;
      background:#0f0f14;
      padding:15px;
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:2px solid var(--red);
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    nav a:hover{
      color:var(--red);
    }

    .section{
      max-width:1100px;
      margin:50px auto;
      padding:0 20px;
    }

    h2{
      border-left:5px solid var(--red);
      padding-left:12px;
      margin-bottom:20px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .card{
      background:var(--card);
      padding:15px;
      border-radius:14px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover{
      transform:translateY(-5px);
      border:1px solid var(--red);
    }

    /* ADMIN PANEL */
    #adminPanel{
      display:none;
      max-width:1100px;
      margin:40px auto;
      padding:20px;
      background:#101018;
      border-radius:16px;
      border:1px solid var(--red);
    }

    .add-team{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .add-team input{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      outline:none;
    }

    .add-team button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      background:var(--red);
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    footer{
      text-align:center;
      padding:25px;
      background:#0f0f14;
      margin-top:50px;
      border-top:1px solid var(--red);
      color:#aaa;
    }
  </style></head><body><header>
  <h1>MANAGER RP ELITE</h1>
  <p>Kırmızı & Beyaz Profesyonel Lig Sistemi</p>  <div class="admin-login">
    <input id="user" placeholder="Kullanıcı" />
    <input id="pass" type="password" placeholder="Şifre" />
    <button onclick="login()">Giriş</button>
  </div>
</header><nav>
  <a href="#superlig">Süper Lig</a>
  <a href="#tff1">TFF 1. Lig</a>
  <a href="#admin">Admin</a>
</nav><section class="section" id="superlig">
  <h2>Süper Lig</h2>
  <div class="cards" id="superLigList"></div>
</section><section class="section" id="tff1">
  <h2>TFF 1. Lig</h2>
  <div class="cards" id="tffList"></div>
</section><section id="adminPanel">
  <h2>Admin Panel</h2>  <div class="add-team">
    <input id="teamName" placeholder="Takım adı" />
    <button onclick="addTeam()">Takım Ekle</button>
  </div>  <div class="cards" id="adminList"></div>
</section><footer>
  © Manager RP Elite System
</footer><script>
let superLig = JSON.parse(localStorage.getItem("superLig")) || ["Galatasaray","Fenerbahçe","Beşiktaş"];
let tff1 = JSON.parse(localStorage.getItem("tff1")) || ["Eyüpspor","Samsunspor"];

function render(){
  document.getElementById("superLigList").innerHTML = superLig.map(t=>`<div class='card'>${t}</div>`).join("");
  document.getElementById("tffList").innerHTML = tff1.map(t=>`<div class='card'>${t}</div>`).join("");
}

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;

  if(u==='admin_mustafa' && p==='1453'){
    document.getElementById('adminPanel').style.display='block';
    alert('Admin giriş başarılı');
  }else{
    alert('Hatalı giriş');
  }
}

function addTeam(){
  let name=document.getElementById('teamName').value;
  if(!name) return;

  superLig.push(name);
  localStorage.setItem("superLig",JSON.stringify(superLig));

  render();
  document.getElementById('teamName').value='';
}

render();
</script></body>
</html>
